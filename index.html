<!doctype html>
<html lang="">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./public/blind-test.css" />
    <title>Blind Test</title>
  </head>
  <body>
    <header></header>
    <main>
      <div id="interface-selection">
        <section id="header-selection">

          <div class="search-wrapper">
            <input
              type="link"
              id="input-playlist"
              placeholder="Colle l'URL d'une playlist Deezer ici..."
            />
            <button id="btn-charger" title="Charger la playlist">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
            </button>
          </div>

          <input
            type="text"
            id="input-recherche"
            placeholder="Recherche une playlist..."
          />
          <button id="btn-chercher">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
         
        </section>

        <div class="section-title-container">
          <h2>Playlists Disponibles</h2>
        </div>
        <section id="body-selection" class="playlist-grid"></section>

        <div class="section-title-container">
          <h2>Mes Favoris</h2>
        </div>
        <section id="favorites-selection" class="playlist-grid"></section>
      </div>

      <div id="interface-options" class="hide">
        <div id="genre-choisi">
          <div id="genre-choisi-figure">
            <h1 id="genre-choisi-title"></h1>
            <img id="genre-choisi-img" src="" alt="" draggable="false" />
          </div>
        </div>

        <div id="options-partie">
          <h2>Paramètres</h2>

          <div class="option-row">
            <span class="option-label">Difficulté (Temps de réponse)</span>
            <div id="difficulty-buttons">
              <button class="diff-btn" data-time="30">Facile (30s)</button>
              <button class="diff-btn active" data-time="20">
                Moyen (20s)
              </button>
              <button class="diff-btn" data-time="10">Difficile (10s)</button>
            </div>
          </div>

          <div id="options-actions">
            <button id="btn-options-retour" type="button">Retour</button>
            <button id="btn-options-valider" type="button">Jouer !</button>
          </div>
        </div>
      </div>

      <div id="interface-partie" class="hide">
        <div id="info-partie">
          <span id="score"></span>
          <span id="nb-tracks"></span>
        </div>

        <button id="btn-quitter-bt">Quitter</button>
        <div id="interface-ig-partie">
          <h1 id="playlist-title"></h1>
          <div id="player">
            <div id="cover-container">
              <img src="" alt="cover" id="cover" />
              <span id="timer"></span>
            </div>
            <span id="response"></span>
          </div>
          <div id="response-part">
            <input type="text" placeholder="Titre de la musique..." />
            <ul id="suggestions" class="hide"></ul>
            <button id="btn-valider" type="button">Valider</button>
            <button id="btn-suivant">Suivant</button>
          </div>
        </div>
        <button id="btn-skip">Le son a bugé...</button>
      </div>
    </main>
    <footer></footer>
    <script type="module" src="main.js"></script>
  </body>
</html>
